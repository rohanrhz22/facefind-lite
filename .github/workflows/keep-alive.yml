name: Keep Render awake

# Pings the live /healthz endpoint so the free Render instance doesn't sleep.
# Free dynos idle out after ~15 min; we ping every 10 min during a wide window.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          URL="https://facefind-lite.onrender.com/healthz"
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 "$URL" || echo "000")
            echo "Attempt $i: HTTP $code"
            if [ "$code" = "200" ]; then
              echo "Instance is awake."
              exit 0
            fi
            sleep 20
          done
          echo "Health check did not return 200 after retries (instance may be cold-starting)."
          exit 0
