# Local dev / VPS deploy: docker compose up --build
services:
  facefind:
    build: .
    image: facefind-lite:latest
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - FACEFIND_DATA_DIR=/data
    volumes:
      - facefind_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  facefind_data:
