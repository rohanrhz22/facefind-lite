# Render.com — free-tier Docker web service.
# Deploy: push to GitHub, then "New + > Blueprint" and point at this repo.
services:
  - type: web
    name: facefind-lite
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    envVars:
      - key: PORT
        value: "8000"
      - key: FACEFIND_DATA_DIR
        value: /data
      # Set a long random value in the Render dashboard to protect reset/delete.
      - key: FACEFIND_ADMIN_TOKEN
        sync: false
      # Persist uploads + face vectors in a free external Postgres (Neon/Supabase
      # /Render). Paste the connection string in the dashboard. Without it the app
      # falls back to ephemeral SQLite (data resets on redeploy/sleep).
      - key: DATABASE_URL
        sync: false
    # Free tier has an ephemeral disk; uploads reset on redeploy/sleep.
    # Add a paid disk for persistence:
    # disk:
    #   name: facefind-data
    #   mountPath: /data
    #   sizeGB: 1
